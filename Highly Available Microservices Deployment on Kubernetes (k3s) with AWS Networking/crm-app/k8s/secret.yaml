apiVersion: v1
kind: Secret
metadata:
  name: crm-db-secret
  namespace: default
  labels:
    app: nexus-crm
type: Opaque
# ── How to apply safely (never commit real values to git) ──────────────────
#
#   Option A — kubectl direct (recommended for dev):
#     kubectl create secret generic crm-db-secret \
#       --from-literal=DB_USER=admin \
#       --from-literal=DB_PASSWORD='your-real-password' \
#       --dry-run=client -o yaml | kubectl apply -f -
#
#   Option B — AWS Secrets Manager + External Secrets Operator (recommended for prod):
#     Use ExternalSecret CR to pull from Secrets Manager automatically.
#
#   Option C — stringData below (only for local dev, never push to git):
# ──────────────────────────────────────────────────────────────────────────
stringData:
  DB_USER:     "admin"          # matches db_username Terraform variable default
  DB_PASSWORD: "123456789"     # replace with your actual password before applying
