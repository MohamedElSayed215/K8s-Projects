name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Frontend (install · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Highly-Available-Cloud-Microservices-Platform/crm-app/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Highly-Available-Cloud-Microservices-Platform/crm-app/frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  backend:
    name: Backend (install)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Highly-Available-Cloud-Microservices-Platform/crm-app/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Highly-Available-Cloud-Microservices-Platform/crm-app/backend/package-lock.json'

      - name: Install dependencies
        run: npm ci
