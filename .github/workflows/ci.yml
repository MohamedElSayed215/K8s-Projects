name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Frontend (build · docker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Highly-Available-Cloud-Microservices-Platform/crm-app/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Highly-Available-Cloud-Microservices-Platform/crm-app/frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: Highly-Available-Cloud-Microservices-Platform/crm-app/frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crm-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crm-frontend:${{ github.sha }}

  backend:
    name: Backend (install · docker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Highly-Available-Cloud-Microservices-Platform/crm-app/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Highly-Available-Cloud-Microservices-Platform/crm-app/backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: Highly-Available-Cloud-Microservices-Platform/crm-app/backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crm-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crm-backend:${{ github.sha }}
