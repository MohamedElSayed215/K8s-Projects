jobs:
  frontend:
    name: Frontend (lint · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Highly-Available-Cloud-Microservices-Platform/crm-app/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # التعديل هنا: خليه يدور في أي مكان على الملف ده
          cache-dependency-path: '**/frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci
      # ... باقي خطوات الـ build

  backend:
    name: Backend (lint · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Highly-Available-Cloud-Microservices-Platform/crm-app/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # التعديل هنا: خليه يدور في أي مكان على الملف ده
          cache-dependency-path: '**/backend/package-lock.json'

      - name: Install dependencies
        run: npm ci
      # ... باقي خطوات الـ test
