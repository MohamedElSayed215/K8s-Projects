name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/nexus-application

jobs:
  # ──────────────────────────────────────────────
  # 1. Frontend
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (lint · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Highly-Available-Cloud-Microservices-Platform/crm-app/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # المسار الجديد بعد ما شيلنا المسافات
          cache-dependency-path: Highly-Available-Cloud-Microservices-Platform/crm-app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          npm run lint
          npm test -- --run
          npm run build

  # ──────────────────────────────────────────────
  # 2. Backend
  # ──────────────────────────────────────────────
  backend:
    name: Backend (lint · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Highly-Available-Cloud-Microservices-Platform/crm-app/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Highly-Available-Cloud-Microservices-Platform/crm-app/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          npm run lint
          npm test
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          NODE_ENV: test

  # ──────────────────────────────────────────────
  # 3. Docker build + push
  # ──────────────────────────────────────────────
  docker:
    name: Docker (build · push)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: Highly-Available-Cloud-Microservices-Platform/crm-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nexus-application:latest
