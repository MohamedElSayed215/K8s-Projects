apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexus-crm-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexus-crm
  minReplicas: 3
  maxReplicas: 10
  metrics:
    # ── Scale on CPU ─────────────────────────────────────────────────────
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # ── Scale on Memory ──────────────────────────────────────────────────
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    # ── Scale Up: fast ───────────────────────────────────────────────────
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type:          Pods
          value:         2
          periodSeconds: 60
    # ── Scale Down: slow (avoid flapping) ───────────────────────────────
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type:          Pods
          value:         1
          periodSeconds: 60
