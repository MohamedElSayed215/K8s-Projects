apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: mongodb-sc

# ─── Provisioner ──────────────────────────────────────────────────

provisioner: ebs.csi.aws.com           # AWS EBS CSI driver


reclaimPolicy: Delete          # Delete | Retain

# ─── Volume Binding Mode ──────────────────────────────────────────
volumeBindingMode: WaitForFirstConsumer   # Immediate | WaitForFirstConsumer


